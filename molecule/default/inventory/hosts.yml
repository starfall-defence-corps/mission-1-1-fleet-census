all:
  vars:
    ansible_user: cadet
    ansible_ssh_private_key_file: ../../.docker/ssh-keys/cadet_key
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  children:
    fleet:
      children:
        web_servers:
          hosts:
            sdc-web:
              ansible_host: localhost
              ansible_port: 2221
        db_servers:
          hosts:
            sdc-db:
              ansible_host: localhost
              ansible_port: 2222
        comms_relays:
          hosts:
            sdc-comms:
              ansible_host: localhost
              ansible_port: 2223
